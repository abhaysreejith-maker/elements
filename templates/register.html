{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<section class="mx-auto max-w-3xl rounded-3xl border border-slate-200 bg-white p-8 shadow-lg">
    <div class="text-center">
        <h1 class="title-font text-3xl font-bold text-slate-900">Create Your Account</h1>
        <p class="mt-2 text-sm text-slate-600">Already registered? <a href="{{ url_for('login') }}" class="font-semibold text-teal-700 hover:text-teal-600">Sign in</a></p>
    </div>

    {% if message %}
    <div class="mt-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ message }}</div>
    {% endif %}

    <form class="mt-6 grid gap-4 sm:grid-cols-2" action="{{ url_for('register') }}" method="POST">
        <div class="sm:col-span-2">
            <label for="username" class="mb-1.5 block text-sm font-semibold text-slate-700">Username</label>
            <input id="username" name="username" type="text" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100" placeholder="Your name">
        </div>

        <div class="sm:col-span-2">
            <label for="email-address" class="mb-1.5 block text-sm font-semibold text-slate-700">Email address</label>
            <input id="email-address" name="useremail" type="email" autocomplete="email" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100" placeholder="you@example.com">
        </div>

        <div>
            <label for="age" class="mb-1.5 block text-sm font-semibold text-slate-700">Age</label>
            <input id="age" name="age" type="number" min="1" max="120" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100" placeholder="21">
        </div>

        <div>
            <label for="gender" class="mb-1.5 block text-sm font-semibold text-slate-700">Gender</label>
            <select id="gender" name="gender" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100">
                <option value="" selected disabled>Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div>
            <label for="password" class="mb-1.5 block text-sm font-semibold text-slate-700">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100" placeholder="Create password">
        </div>

        <div>
            <label for="confirm-password" class="mb-1.5 block text-sm font-semibold text-slate-700">Confirm password</label>
            <input id="confirm-password" name="c_password" type="password" autocomplete="new-password" required class="w-full rounded-xl border border-slate-300 px-4 py-3 text-slate-900 outline-none transition focus:border-teal-600 focus:ring-2 focus:ring-teal-100" placeholder="Re-enter password">
        </div>

        <div class="sm:col-span-2">
            <button type="submit" class="w-full rounded-xl bg-teal-700 px-4 py-3 text-sm font-semibold text-white transition hover:bg-teal-600">Create Account</button>
        </div>
    </form>
</section>
{% endblock %}
