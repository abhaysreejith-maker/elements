<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="keywords" content="login, vocalize" />
  <meta name="description" content="Vocalize login page." />
  <meta name="author" content="Vocalize" />

  <title>Vocalize | Login</title>
  <link rel="stylesheet" type="text/css" href="/static/css/bootstrap.css" />
  <link href="https://fonts.googleapis.com/css?family=Poppins:400,700|Roboto:400,700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/static/css/style.css" rel="stylesheet" />
  <link href="/static/css/responsive.css" rel="stylesheet" />
</head>

<body class="sub_page">
  <header class="header_section">
    <div class="container">
      <nav class="navbar navbar-expand-lg custom_nav-container">
        <a class="navbar-brand" href="{{ url_for('index') }}">
          <img src="/static/images/logo.png" alt="Vocalize logo">
          <span>Vocalize</span>
        </a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <div class="d-flex mx-auto flex-column flex-lg-row align-items-center">
            <ul class="navbar-nav">
              <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Home</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
              <li class="nav-item active"><a class="nav-link" href="{{ url_for('login') }}">Login</a></li>
              <li class="nav-item"><a class="nav-link" href="{{ url_for('register') }}">Register</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <section class="auth-hero">
    <div class="container">
      <div class="auth-hero-content">
        <h1>Welcome Back</h1>
        <p>Sign in to continue your musical journey</p>
      </div>
    </div>
  </section>

  <section class="auth-section">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-6">
          <div class="auth-card">
            <div class="auth-header">
              <i class="fas fa-sign-in-alt auth-icon"></i>
              <h2>Sign In to Vocalize</h2>
              <p class="text-muted">Access your personalized music recommendations</p>
            </div>
            {% if message %}
              <div class="alert alert-info-modern" role="alert">
                <i class="fas fa-info-circle me-2"></i>{{ message }}
              </div>
            {% endif %}
            <form action="{{ url_for('login') }}" method="post">
              <div class="form-group-modern">
                <label for="email" class="form-label-modern">
                  <i class="fas fa-envelope me-2"></i>Email Address
                </label>
                <input type="email" class="form-control-modern" id="email" name="useremail" placeholder="Enter your email" required>
              </div>
              <div class="form-group-modern">
                <label for="password" class="form-label-modern">
                  <i class="fas fa-lock me-2"></i>Password
                </label>
                <input type="password" class="form-control-modern" id="password" name="password" placeholder="Enter your password" required>
              </div>
              <button type="submit" class="btn btn-primary-modern w-100">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
              </button>
            </form>
            <div class="auth-footer">
              <p>Don't have an account? <a href="{{ url_for('register') }}" class="auth-link">Create one here</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="text/javascript" src="/static/js/jquery-3.4.1.min.js"></script>
  <script type="text/javascript" src="/static/js/bootstrap.js"></script>
</body>
</html>
